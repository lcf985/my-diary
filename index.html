<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>我的日记</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --color-bg: #fdf6f0;
  --color-surface: #ffffff;
  --color-primary: #d4846b;
  --color-primary-hover: #c0735b;
  --color-text: #3d2c2a;
  --color-text-muted: #8c7a74;
  --color-border: #e8d5cc;
  --color-accent: #f0c9b9;
  --color-today-bg: #fbe9e3;
  --color-selected-bg: #f5e0d8;
  --color-danger: #c0392b;
  --color-danger-hover: #a93226;
  --color-success: #6b8f71;
  --color-overlay: rgba(61, 44, 42, 0.4);
  --color-outside: #c9bdb7;
  --radius: 8px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --shadow-card: 0 2px 8px rgba(61, 44, 42, 0.06);
  --shadow-modal: 0 8px 32px rgba(61, 44, 42, 0.15);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  --transition: 0.2s ease;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  background: var(--color-bg);
  color: var(--color-text);
  line-height: 1.6;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
  font-size: inherit;
  touch-action: manipulation;
}
input, textarea {
  font-family: inherit;
  font-size: 1rem;
  color: var(--color-text);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: 10px 14px;
  background: var(--color-surface);
  outline: none;
  transition: border-color var(--transition);
}
input:focus, textarea:focus { border-color: var(--color-primary); }
.hidden { display: none !important; }
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

/* ===== App Shell ===== */
#app {
  max-width: 600px;
  margin: 0 auto;
  padding: 0 12px 80px;
}

/* ===== Header ===== */
#app-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--color-bg);
  padding: 12px 0 8px;
}
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.btn-nav {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  border-radius: 50%;
  color: var(--color-primary);
  background: var(--color-surface);
  box-shadow: var(--shadow-card);
  transition: background var(--transition);
  flex-shrink: 0;
}
.btn-nav:hover, .btn-nav:active { background: var(--color-accent); }
.month-year-label {
  font-size: 1.25rem;
  font-weight: 700;
  text-align: center;
  user-select: none;
}
.header-actions {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 6px;
}
.btn-today {
  font-size: 0.85rem;
  color: var(--color-primary);
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid var(--color-primary);
  transition: all var(--transition);
}
.btn-today:hover, .btn-today:active { background: var(--color-primary); color: #fff; }
.btn-lock {
  width: 36px;
  height: 36px;
  font-size: 1.2rem;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
}
.btn-lock:hover, .btn-lock:active { background: var(--color-accent); }

/* Sync status dot */
.sync-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
  transition: background 0.3s;
}
.sync-dot.none { background: #ccc; }
.sync-dot.synced { background: var(--color-success); }
.sync-dot.syncing { background: #f0ad4e; animation: pulse 1s infinite; }
.sync-dot.error { background: var(--color-danger); }
.sync-dot.offline { background: #999; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

/* Settings button */
.btn-settings {
  width: 36px; height: 36px;
  font-size: 1.1rem;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
}
.btn-settings:hover, .btn-settings:active { background: var(--color-accent); }

/* Settings overlay */
#settings-overlay {
  position: fixed; inset: 0;
  background: var(--color-overlay);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#settings-overlay.hidden { display: none; }
.settings-card {
  background: var(--color-surface);
  border-radius: var(--radius-xl);
  padding: 28px 24px;
  width: 100%; max-width: 400px;
  box-shadow: var(--shadow-modal);
}
.settings-card h2 { font-size: 1.2rem; margin-bottom: 4px; }
.settings-card .settings-subtitle {
  font-size: 0.8rem; color: var(--color-text-muted); margin-bottom: 16px; line-height: 1.5;
}
.settings-card label {
  display: block; font-size: 0.8rem; font-weight: 600;
  color: var(--color-text-muted); margin-bottom: 4px; margin-top: 12px;
}
.settings-card input {
  width: 100%; margin-bottom: 6px; font-size: 0.85rem;
}
.settings-card .settings-hint {
  font-size: 0.7rem; color: var(--color-text-muted);
  margin-bottom: 8px; line-height: 1.4;
}
.settings-card .settings-hint a {
  color: var(--color-primary); text-decoration: none;
}
.settings-card .settings-actions {
  display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px;
}
.settings-card .settings-status {
  font-size: 0.8rem; color: var(--color-success); text-align: center; margin-top: 8px;
  min-height: 20px;
}
.settings-card .settings-status.error { color: var(--color-danger); }

/* ===== Calendar ===== */
#calendar-section {
  margin-top: 8px;
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  padding: 12px 8px;
  box-shadow: var(--shadow-card);
}
.calendar-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-size: 0.75rem;
  color: var(--color-text-muted);
  font-weight: 600;
  margin-bottom: 4px;
}
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}
.calendar-cell {
  aspect-ratio: 1 / 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  cursor: pointer;
  position: relative;
  font-size: 0.85rem;
  transition: background var(--transition);
  user-select: none;
  min-width: 0;
}
.calendar-cell:hover { background: var(--color-accent); }
.calendar-cell.outside-month { color: var(--color-outside); cursor: default; }
.calendar-cell.outside-month:hover { background: transparent; }
.calendar-cell.today { background: var(--color-today-bg); font-weight: 700; }
.calendar-cell.selected { box-shadow: inset 0 0 0 2px var(--color-primary); }
.calendar-cell .day-num { line-height: 1; }
.calendar-cell .emoji-marker {
  font-size: 0.65rem;
  line-height: 1;
  position: absolute;
  bottom: 3px;
  pointer-events: none;
}

/* ===== Diary Section ===== */
#diary-section { margin-top: 16px; }
.diary-date-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 16px 0 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--color-border);
}
.diary-date-header:first-child { margin-top: 0; }
.diary-date-text {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--color-text-muted);
}
.diary-date-count {
  font-size: 0.75rem;
  color: var(--color-text-muted);
  background: var(--color-accent);
  padding: 1px 8px;
  border-radius: 10px;
}
.entry-card {
  background: var(--color-surface);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 8px;
  box-shadow: var(--shadow-card);
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition);
  position: relative;
}
.entry-card:hover, .entry-card:active { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(61,44,42,0.1); }
.entry-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}
.entry-emoji { font-size: 1.3rem; flex-shrink: 0; }
.entry-title {
  font-weight: 600;
  font-size: 1rem;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.entry-preview {
  font-size: 0.85rem;
  color: var(--color-text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-left: 30px;
}
.entry-actions {
  display: flex;
  gap: 4px;
  position: absolute;
  top: 10px;
  right: 10px;
}
.entry-actions button {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
}
.btn-edit:hover { background: var(--color-accent); }
.btn-delete { color: var(--color-danger); }
.btn-delete:hover { background: #fde8e8; }

.empty-state {
  text-align: center;
  padding: 48px 16px;
  color: var(--color-text-muted);
}
.empty-state-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state-text { font-size: 0.95rem; }

/* ===== FAB ===== */
#fab {
  position: fixed;
  bottom: 24px;
  bottom: calc(24px + env(safe-area-inset-bottom, 0px));
  right: 24px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--color-primary);
  color: #fff;
  font-size: 1.6rem;
  box-shadow: 0 4px 16px rgba(212, 132, 107, 0.4);
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform var(--transition), opacity var(--transition);
}
#fab:hover { transform: scale(1.08); }
#fab:active { transform: scale(0.95); }
#fab.hidden { transform: scale(0); opacity: 0; pointer-events: none; }

/* ===== Modal ===== */
#modal-overlay {
  position: fixed;
  inset: 0;
  background: var(--color-overlay);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 0;
}
#modal-overlay.hidden { display: none; }
#modal-card {
  background: var(--color-surface);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%;
  max-width: 600px;
  max-height: 85vh;
  max-height: 85dvh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-modal);
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--color-border);
  flex-shrink: 0;
}
.modal-date { font-size: 0.85rem; color: var(--color-text-muted); }
.modal-close {
  width: 36px; height: 36px;
  border-radius: 50%;
  font-size: 1.3rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
  margin-left: auto;
}
.modal-close:hover { background: var(--color-accent); }
.modal-body {
  padding: 16px;
  overflow-y: auto;
  flex: 1;
}
.modal-body .entry-detail-emoji { font-size: 2.5rem; text-align: center; margin-bottom: 8px; }
.modal-body .entry-detail-title {
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 4px;
  text-align: center;
  word-break: break-word;
}
.modal-body .entry-detail-meta {
  font-size: 0.8rem;
  color: var(--color-text-muted);
  text-align: center;
  margin-bottom: 16px;
}
.modal-body .entry-detail-content {
  font-size: 0.95rem;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Edit form in modal */
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--color-text-muted);
  margin-bottom: 4px;
}
.form-group .emoji-input { font-size: 1.5rem; width: 60px; text-align: center; }
.form-group textarea {
  width: 100%;
  min-height: 120px;
  resize: vertical;
  line-height: 1.7;
}
.form-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 16px;
}
.btn {
  padding: 10px 20px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 0.9rem;
  transition: all var(--transition);
}
.btn-primary { background: var(--color-primary); color: #fff; }
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-secondary { background: var(--color-accent); color: var(--color-text); }
.btn-secondary:hover { background: var(--color-border); }
.btn-danger { background: var(--color-danger); color: #fff; }
.btn-danger:hover { background: var(--color-danger-hover); }
.btn-sm { padding: 6px 14px; font-size: 0.8rem; }

/* ===== Password Dialog ===== */
#password-overlay {
  position: fixed;
  inset: 0;
  background: var(--color-overlay);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#password-overlay.hidden { display: none; }
.password-card {
  background: var(--color-surface);
  border-radius: var(--radius-xl);
  padding: 28px 24px;
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow-modal);
  text-align: center;
}
.password-card h2 { margin-bottom: 6px; font-size: 1.3rem; }
.password-card .pw-subtitle { font-size: 0.85rem; color: var(--color-text-muted); margin-bottom: 20px; }
.password-card .pw-error {
  font-size: 0.85rem;
  color: var(--color-danger);
  margin-top: 8px;
  min-height: 20px;
}
.password-card input { width: 100%; margin-bottom: 10px; }
.password-card .pw-actions { display: flex; gap: 10px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
.pw-link {
  font-size: 0.8rem;
  color: var(--color-text-muted);
  margin-top: 16px;
  display: block;
  cursor: pointer;
  text-decoration: underline;
}
.pw-link.danger { color: var(--color-danger); margin-top: 24px; }

/* ===== Toast ===== */
#toast-container {
  position: fixed;
  top: 16px;
  right: 16px;
  left: 16px;
  z-index: 300;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  pointer-events: none;
}
.toast {
  padding: 12px 18px;
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-weight: 500;
  color: #fff;
  box-shadow: var(--shadow-modal);
  animation: toastIn 0.3s ease;
  pointer-events: auto;
  max-width: 360px;
}
.toast.success { background: var(--color-success); }
.toast.error { background: var(--color-danger); }
.toast.info { background: var(--color-primary); }
@keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ===== Confirm Dialog ===== */
#confirm-overlay {
  position: fixed;
  inset: 0;
  background: var(--color-overlay);
  z-index: 250;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#confirm-overlay.hidden { display: none; }
.confirm-card {
  background: var(--color-surface);
  border-radius: var(--radius-xl);
  padding: 24px;
  width: 100%;
  max-width: 340px;
  box-shadow: var(--shadow-modal);
  text-align: center;
}
.confirm-card p { margin-bottom: 20px; font-size: 0.95rem; }
.confirm-actions { display: flex; gap: 10px; justify-content: center; }

/* ===== Responsive ===== */
@media (min-width: 768px) {
  #app { padding: 0 20px 80px; }
  #modal-overlay { align-items: center; padding: 40px; }
  #modal-card { border-radius: var(--radius-xl); max-height: 80vh; }
  .calendar-cell { font-size: 0.95rem; }
  .calendar-cell .emoji-marker { font-size: 0.75rem; bottom: 4px; }
}
@media (min-width: 1024px) {
  #app { padding: 0 0 80px; }
  #calendar-section { padding: 16px 12px; }
}

/* ===== Reduced Motion ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<!-- ===== APP ===== -->
<div id="app">
  <header id="app-header">
    <div class="header-row">
      <button class="btn-nav" data-action="prev-month" aria-label="上个月">◀</button>
      <h1 class="month-year-label" id="month-year-label" aria-live="polite">2026年6月</h1>
      <button class="btn-nav" data-action="next-month" aria-label="下个月">▶</button>
    </div>
    <div class="header-actions">
      <span class="sync-dot none" id="sync-dot" data-action="sync-retry" title="未设置同步"></span>
      <button class="btn-today" data-action="today">今天</button>
      <button class="btn-lock" data-action="toggle-lock" id="btn-lock" aria-label="解锁编辑">🔒</button>
      <button class="btn-settings" data-action="open-settings" aria-label="同步设置">⚙️</button>
    </div>
  </header>

  <main id="app-main">
    <section id="calendar-section">
      <div class="calendar-weekdays" id="calendar-weekdays"></div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </section>

    <section id="diary-section">
      <div id="diary-list"></div>
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-state-icon">📝</div>
        <div class="empty-state-text">本月暂无日记</div>
      </div>
    </section>
  </main>

  <button id="fab" class="hidden" data-action="add-entry" aria-label="写日记">＋</button>
</div>

<!-- ===== MODAL OVERLAY ===== -->
<div id="modal-overlay" class="hidden">
  <div id="modal-card">
    <div class="modal-header">
      <span class="modal-date" id="modal-date-label"></span>
      <button class="modal-close" data-action="close-modal" aria-label="关闭">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- ===== PASSWORD OVERLAY ===== -->
<div id="password-overlay" class="hidden">
  <div class="password-card" id="password-card"></div>
</div>

<!-- ===== SETTINGS OVERLAY ===== -->
<div id="settings-overlay" class="hidden">
  <div class="settings-card" id="settings-card"></div>
</div>

<!-- ===== CONFIRM OVERLAY ===== -->
<div id="confirm-overlay" class="hidden">
  <div class="confirm-card">
    <p id="confirm-message"></p>
    <div class="confirm-actions">
      <button class="btn btn-secondary" id="confirm-cancel">取消</button>
      <button class="btn btn-danger" id="confirm-ok">确认</button>
    </div>
  </div>
</div>

<!-- ===== TOAST CONTAINER ===== -->
<div id="toast-container"></div>

<!-- ===== JAVASCRIPT ===== -->
<script>
(function() {
'use strict';

/* =================================================================
   SECTION 1: State Manager (Simple Pub/Sub)
   ================================================================= */
const Store = {
  _state: {
    entries: [],
    currentMonth: new Date().getMonth(),
    currentYear: new Date().getFullYear(),
    selectedDate: null,
    isAuthenticated: false,
    editingEntry: null,       // entry object when editing, null when viewing/creating
    editingDate: null,
    confirmCallback: null,
    syncStatus: 'none',
    hasToken: false
  },
  _listeners: {},

  get(key) { return this._state[key]; },

  set(key, value) {
    this._state[key] = value;
    (this._listeners[key] || []).forEach(fn => { try { fn(value); } catch(e) {} });
  },

  onChange(key, fn) {
    if (!this._listeners[key]) this._listeners[key] = [];
    this._listeners[key].push(fn);
  },

  batch(updates) {
    for (const [key, value] of Object.entries(updates)) {
      this._state[key] = value;
    }
    for (const key of Object.keys(updates)) {
      (this._listeners[key] || []).forEach(fn => { try { fn(this._state[key]); } catch(e) {} });
    }
  },

  init() {
    const today = new Date();
    const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    this._state.selectedDate = dateStr;
  }
};

/* =================================================================
   SECTION 2: Service Layer
   ================================================================= */

// --- Password Service ---
const PasswordService = {
  FIXED_PASSWORD: '9852',
  SESSION_KEY: 'diary_session',

  verify(password) {
    return password === this.FIXED_PASSWORD;
  },
  isSessionActive() { return sessionStorage.getItem(this.SESSION_KEY) === '1'; },
  setSessionActive() { sessionStorage.setItem(this.SESSION_KEY, '1'); },
  clearSession() { sessionStorage.removeItem(this.SESSION_KEY); }
};

// --- GitHub Sync Service ---
const GitHubService = {
  TOKEN_KEY: 'diary_gh_token',
  OWNER_KEY: 'diary_gh_owner',
  REPO_KEY: 'diary_gh_repo',
  FIXED_KEY: '9852',

  getToken() { return localStorage.getItem(this.TOKEN_KEY) || ''; },
  setToken(t) { localStorage.setItem(this.TOKEN_KEY, t); },
  hasToken() { return !!this.getToken(); },
  clearToken() { localStorage.removeItem(this.TOKEN_KEY); },

  // Auto-detect repo info from URL
  getRepoInfo() {
    let owner = localStorage.getItem(this.OWNER_KEY) || '';
    let repo = localStorage.getItem(this.REPO_KEY) || '';
    if (!owner || !repo) {
      const host = window.location.hostname;
      const path = window.location.pathname;
      if (host.endsWith('.github.io')) {
        owner = host.replace('.github.io', '');
      }
      repo = path.replace(/^\/+|\/+$/g, '').split('/')[0] || '';
    }
    return { owner, repo };
  },

  setRepoInfo(owner, repo) {
    localStorage.setItem(this.OWNER_KEY, owner);
    localStorage.setItem(this.REPO_KEY, repo);
  },

  // Simple encrypt/decrypt (XOR with key) for token obfuscation
  _encrypt(text) {
    let result = '';
    for (let i = 0; i < text.length; i++) {
      result += String.fromCharCode(text.charCodeAt(i) ^ this.FIXED_KEY.charCodeAt(i % this.FIXED_KEY.length));
    }
    return btoa(result);
  },
  _decrypt(b64) {
    const encoded = atob(b64);
    let result = '';
    for (let i = 0; i < encoded.length; i++) {
      result += String.fromCharCode(encoded.charCodeAt(i) ^ this.FIXED_KEY.charCodeAt(i % this.FIXED_KEY.length));
    }
    return result;
  },

  // Read data.json from GitHub API (authenticated)
  async fetchEntries() {
    const token = this.getToken();
    const { owner, repo } = this.getRepoInfo();
    if (!owner || !repo) throw new Error('请先设置仓库信息');

    const url = `https://api.github.com/repos/${owner}/${repo}/contents/data.json`;
    const res = await fetch(url, {
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' }
    });

    if (res.status === 404) return { entries: [], sha: null, exists: false };
    if (!res.ok) {
      if (res.status === 401) throw new Error('Token 无效或已过期');
      throw new Error(`GitHub API 错误: ${res.status}`);
    }

    const data = await res.json();
    const content = JSON.parse(atob(data.content));
    // Support both old format (plain array) and new format { entries, _t }
    const isOldFormat = Array.isArray(content);
    const entries = isOldFormat ? content : (content.entries || []);
    // Auto-extract token from data if present
    if (!isOldFormat && content._t && !this.getToken()) {
      try {
        const decrypted = this._decrypt(content._t);
        if (decrypted) {
          this.setToken(decrypted);
          Store.set('hasToken', true);
        }
      } catch(e) { /* ignore decrypt errors */ }
    }
    return { entries, sha: data.sha, exists: true };
  },

  // Push entries to GitHub
  async pushEntries(entries, sha) {
    const token = this.getToken();
    const { owner, repo } = this.getRepoInfo();
    if (!owner || !repo) throw new Error('请先设置仓库信息');

    // Always include encrypted token in the payload
    const payload = { entries, _t: this._encrypt(token) };
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
    const body = { message: 'Update diary data', content };
    if (sha) body.sha = sha;

    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data.json`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' },
      body: JSON.stringify(body)
    });

    if (res.status === 409) {
      const latest = await this.fetchEntries();
      const merged = this._mergeEntries(latest.entries, entries);
      return this.pushEntries(merged, latest.sha);
    }

    if (!res.ok) {
      if (res.status === 401) throw new Error('Token 无效或已过期');
      throw new Error(`GitHub API 错误: ${res.status}`);
    }

    const data = await res.json();
    return data.content ? data.content.sha : (data.sha || null);
  },

  // Try to auto-setup token from raw URL (no auth needed for public repos)
  async tryAutoSetup() {
    if (this.hasToken()) return true;
    const { owner, repo } = this.getRepoInfo();
    if (!owner || !repo) return false;

    try {
      const url = `https://raw.githubusercontent.com/${owner}/${repo}/main/data.json`;
      const res = await fetch(url, { cache: 'no-cache' });
      if (!res.ok) return false;
      const text = await res.text();
      const content = JSON.parse(text);
      // Support both old and new formats
      const isOldFormat = Array.isArray(content);
      if (!isOldFormat && content._t) {
        const decrypted = this._decrypt(content._t);
        if (decrypted && (decrypted.startsWith('ghp_') || decrypted.startsWith('github_pat_'))) {
          this.setToken(decrypted);
          this.setRepoInfo(owner, repo);
          Store.set('hasToken', true);
          Store.set('syncStatus', 'syncing');
          updateSyncDot();
          return true;
        }
      }
      return false;
    } catch(e) {
      return false;
    }
  },

  _mergeEntries(remote, local) {
    const map = new Map();
    for (const e of remote) map.set(e.id, e);
    for (const e of local) {
      const existing = map.get(e.id);
      if (!existing || new Date(e.createdAt) >= new Date(existing.createdAt)) {
        map.set(e.id, e);
      }
    }
    return [...map.values()].sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
  }
};

// --- Entry Service ---
const EntryService = {
  STORAGE_KEY: 'diary_entries',

  loadAll() {
    try {
      const raw = localStorage.getItem(this.STORAGE_KEY);
      if (!raw) return [];
      const data = JSON.parse(raw);
      if (!Array.isArray(data)) return [];
      return data;
    } catch(e) {
      return [];
    }
  },

  saveAll(entries) {
    try {
      localStorage.setItem(this.STORAGE_KEY, JSON.stringify(entries));
    } catch(e) {
      if (e.name === 'QuotaExceededError') {
        ToastRenderer.show('存储空间不足，请删除一些日记', 'error');
      } else {
        ToastRenderer.show('保存失败，请重试', 'error');
      }
    }
  },

  create(date, emoji, title, content) {
    return {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 8),
      date: date,
      emoji: emoji || '📖',
      title: (title || '').trim() || '无标题',
      content: content || '',
      createdAt: new Date().toISOString()
    };
  },

  add(entry) {
    const entries = this.loadAll();
    entries.push(entry);
    entries.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
    this.saveAll(entries);
    this._syncToGitHub(entries);
    return entries;
  },

  update(id, updates) {
    const entries = this.loadAll();
    const idx = entries.findIndex(e => e.id === id);
    if (idx === -1) return null;
    entries[idx] = { ...entries[idx], ...updates };
    entries.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
    this.saveAll(entries);
    this._syncToGitHub(entries);
    return entries;
  },

  delete(id) {
    const entries = this.loadAll().filter(e => e.id !== id);
    this.saveAll(entries);
    this._syncToGitHub(entries);
    return entries;
  },

  _syncToGitHub(entries) {
    if (!GitHubService.hasToken()) return;
    Store.set('syncStatus', 'syncing');
    // Cache the current sha for push
    const sha = Store._cachedSha || null;
    GitHubService.pushEntries(entries, sha).then(newSha => {
      Store._cachedSha = newSha;
      Store.set('syncStatus', 'synced');
    }).catch(err => {
      console.error('GitHub sync failed:', err);
      if (err.message.includes('Token')) {
        Store.set('syncStatus', 'error');
        ToastRenderer.show('同步失败: ' + err.message, 'error');
      } else if (err.message.includes('网络') || err.message.includes('fetch')) {
        Store.set('syncStatus', 'offline');
      } else {
        Store.set('syncStatus', 'error');
        ToastRenderer.show('同步失败，数据已保存在本地', 'error');
      }
    });
  },

  getByMonth(year, month) {
    const prefix = `${year}-${String(month + 1).padStart(2, '0')}`;
    return this.loadAll().filter(e => e.date.startsWith(prefix));
  },

  getByDate(dateStr) {
    return this.loadAll().filter(e => e.date === dateStr);
  },

  // Group entries by date for a given month, sorted by date ascending
  getGroupedByMonth(year, month) {
    const entries = this.getByMonth(year, month);
    const groups = new Map();
    for (const e of entries) {
      if (!groups.has(e.date)) groups.set(e.date, []);
      groups.get(e.date).push(e);
    }
    // Sort by date
    const sorted = [...groups.entries()].sort((a, b) => a[0].localeCompare(b[0]));
    return sorted;
  },

  // Get emoji map for calendar: dateStr -> emoji (first entry of that day)
  getEmojiMap(year, month) {
    const entries = this.getByMonth(year, month);
    const map = {};
    for (const e of entries) {
      if (!map[e.date]) map[e.date] = e.emoji;
    }
    return map;
  }
};

const WEEKDAY_LABELS = ['日', '一', '二', '三', '四', '五', '六'];

// --- Calendar ---
function renderCalendar() {
  const y = Store.get('currentYear');
  const m = Store.get('currentMonth');
  const selDate = Store.get('selectedDate');
  const emojiMap = EntryService.getEmojiMap(y, m);

  // Weekday headers
  const weekdaysEl = document.getElementById('calendar-weekdays');
  weekdaysEl.innerHTML = WEEKDAY_LABELS.map(d => `<span>${d}</span>`).join('');

  // Grid
  const grid = document.getElementById('calendar-grid');
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  const firstDay = new Date(y, m, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const daysInPrevMonth = new Date(y, m, 0).getDate();

  let html = '';

  // 42 cells (6 rows x 7)
  for (let i = 0; i < 42; i++) {
    let dayNum, dateStr, isOutside = false;

    if (i < firstDay) {
      // Previous month
      dayNum = daysInPrevMonth - firstDay + i + 1;
      const pm = m === 0 ? 11 : m - 1;
      const py = m === 0 ? y - 1 : y;
      dateStr = `${py}-${String(pm+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      isOutside = true;
    } else if (i - firstDay >= daysInMonth) {
      // Next month
      dayNum = i - firstDay - daysInMonth + 1;
      const nm = m === 11 ? 0 : m + 1;
      const ny = m === 11 ? y + 1 : y;
      dateStr = `${ny}-${String(nm+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      isOutside = true;
    } else {
      dayNum = i - firstDay + 1;
      dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    }

    const classes = ['calendar-cell'];
    if (isOutside) classes.push('outside-month');
    if (dateStr === todayStr) classes.push('today');
    if (dateStr === selDate && !isOutside) classes.push('selected');

    const emoji = emojiMap[dateStr] || '';

    html += `<div class="${classes.join(' ')}" data-action="select-date" data-date="${dateStr}">
      <span class="day-num">${dayNum}</span>
      ${emoji ? `<span class="emoji-marker">${emoji}</span>` : ''}
    </div>`;
  }

  grid.innerHTML = html;
}

// --- Diary List ---
function renderDiaryList() {
  const y = Store.get('currentYear');
  const m = Store.get('currentMonth');
  const isAuth = Store.get('isAuthenticated');
  const groups = EntryService.getGroupedByMonth(y, m);

  const listEl = document.getElementById('diary-list');
  const emptyEl = document.getElementById('empty-state');

  if (groups.length === 0) {
    listEl.innerHTML = '';
    emptyEl.classList.remove('hidden');
    return;
  }

  emptyEl.classList.add('hidden');

  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const dayNames = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

  let html = '';

  for (const [dateStr, entries] of groups) {
    const parts = dateStr.split('-');
    const d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
    const dayName = dayNames[d.getDay()];
    const label = `${+parts[1]}月${+parts[2]}日 ${dayName}`;

    html += `<div class="diary-date-header" id="date-${dateStr}">
      <span class="diary-date-text">${label}</span>
      <span class="diary-date-count">${entries.length}条</span>
    </div>`;

    for (const entry of entries) {
      const preview = entry.content ? (entry.content.length > 80 ? entry.content.slice(0, 80) + '…' : entry.content) : '(无内容)';
      html += `<div class="entry-card" data-action="view-entry" data-entry-id="${entry.id}">
        <div class="entry-card-header">
          <span class="entry-emoji">${entry.emoji}</span>
          <span class="entry-title">${escapeHTML(entry.title)}</span>
        </div>
        <div class="entry-preview">${escapeHTML(preview)}</div>
        ${isAuth ? `
        <div class="entry-actions">
          <button class="btn-edit" data-action="edit-entry" data-entry-id="${entry.id}" aria-label="编辑" title="编辑">✏️</button>
          <button class="btn-delete" data-action="delete-entry" data-entry-id="${entry.id}" aria-label="删除" title="删除">🗑️</button>
        </div>` : ''}
      </div>`;
    }
  }

  listEl.innerHTML = html;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  Store.set('editingEntry', null);
  Store.set('editingDate', null);
}

function saveEntry(entryId) {
  const emojiInput = document.getElementById('edit-emoji');
  const titleInput = document.getElementById('edit-title');
  const contentInput = document.getElementById('edit-content');

  const emoji = (emojiInput.value || '').trim() || '📖';
  const title = titleInput.value || '';
  const content = contentInput.value || '';

  if (!title.trim()) {
    ToastRenderer.show('请输入标题', 'error');
    titleInput.focus();
    return;
  }

  if (entryId) {
    // Update existing
    EntryService.update(entryId, { emoji, title: title.trim(), content });
    ToastRenderer.show('日记已更新', 'success');
  } else {
    // Create new
    const dateStr = Store.get('editingDate') || Store.get('selectedDate');
    const entry = EntryService.create(dateStr, emoji, title.trim(), content);
    EntryService.add(entry);
    ToastRenderer.show('日记已保存', 'success');
  }

  closeModal();
  Store.set('entries', EntryService.loadAll());
  refreshUI();
}

function deleteEntry(entryId) {
  showConfirm('确定要删除这条日记吗？此操作不可撤销。', () => {
    EntryService.delete(entryId);
    closeModal();
    Store.set('entries', EntryService.loadAll());
    refreshUI();
    ToastRenderer.show('日记已删除', 'info');
  });
}

  const card = document.getElementById('settings-card');

  card.innerHTML = `
    <h2>⚙️ GitHub 同步设置</h2>

  document.getElementById('settings-overlay').classList.remove('hidden');

      return;
    }

    statusEl.textContent = '正在同步...';
    statusEl.className = 'settings-status';
    Store.set('hasToken', true);
    Store.set('syncStatus', 'syncing');
    updateSyncDot();

    try {
      const { entries, sha, exists } = await GitHubService.fetchEntries();
      Store._cachedSha = sha;
      if (!exists) {
        const local = EntryService.loadAll();
        const newSha = await GitHubService.pushEntries(local, null);
        Store._cachedSha = newSha;
        Store.set('entries', local);
        Store.set('syncStatus', 'synced');
        statusEl.textContent = '✅ 已创建同步文件！' + local.length + ' 条日记已上传。Token 已保存，其他设备打开网页将自动同步。';
        statusEl.className = 'settings-status';
        refreshUI();
      } else {
        EntryService.saveAll(entries);
        Store.set('entries', entries);
        Store.set('syncStatus', 'synced');
        statusEl.textContent = '✅ 同步成功！已加载 ' + entries.length + ' 条日记。Token 已保存到云端。';
        statusEl.className = 'settings-status';
        refreshUI();
      }
    } catch(err) {
      statusEl.textContent = '❌ ' + err.message;
      statusEl.className = 'settings-status error';
      Store.set('syncStatus', 'error');
      updateSyncDot();
    }
  });

  const clearBtn = document.getElementById('btn-clear-token');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      GitHubService.clearToken();
      Store.set('hasToken', false);
      Store.set('syncStatus', 'none');
      updateSyncDot();
      showSettings();
      ToastRenderer.show('Token 已清除', 'info');
    });
  }
}

function hideSettings() {
  document.getElementById('settings-overlay').classList.add('hidden');
}

function updateFAB() {
  const fab = document.getElementById('fab');
  if (Store.get('isAuthenticated')) {
    fab.classList.remove('hidden');
  } else {
    fab.classList.add('hidden');
  }
}

// --- Lock Button ---
function updateLockButton() {
  const btn = document.getElementById('btn-lock');
  if (Store.get('isAuthenticated')) {
    btn.textContent = '🔓';
    btn.setAttribute('aria-label', '锁定编辑');
  } else {
    btn.textContent = '🔒';
    btn.setAttribute('aria-label', '解锁编辑');
  }
}

/* =================================================================
   SECTION 4: Event Delegation
   ================================================================= */

function handleAction(action, dataset) {
  switch (action) {
    case 'prev-month': {
      let m = Store.get('currentMonth');
      let y = Store.get('currentYear');
      if (m === 0) { m = 11; y--; }
      else { m--; }
      Store.batch({ currentMonth: m, currentYear: y });
      refreshUI();
      break;
    }
    case 'next-month': {
      let m = Store.get('currentMonth');
      let y = Store.get('currentYear');
      if (m === 11) { m = 0; y++; }
      else { m++; }
      Store.batch({ currentMonth: m, currentYear: y });
      refreshUI();
      break;
    }
    case 'today': {
      const today = new Date();
      const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      Store.batch({
        currentMonth: today.getMonth(),
        currentYear: today.getFullYear(),
        selectedDate: dateStr
      });
      refreshUI();
      // Scroll to today's section
      setTimeout(() => {
        const el = document.getElementById('date-' + dateStr);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
      break;
    }
    case 'select-date': {
      if (!dataset.date) break;
      const parts = dataset.date.split('-');
      const y = +parts[0];
      const m = +parts[1] - 1;
      const currY = Store.get('currentYear');
      const currM = Store.get('currentMonth');

      Store.set('selectedDate', dataset.date);

      // If clicking outside month, navigate to that month
      if (y !== currY || m !== currM) {
        Store.batch({ currentMonth: m, currentYear: y });
      }

      refreshUI();

      // Scroll to date section
      setTimeout(() => {
        const el = document.getElementById('date-' + dataset.date);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
      break;
    }
    case 'view-entry': {
      if (!dataset.entryId) break;
      openViewModal(dataset.entryId);
      break;
    }
    case 'edit-entry': {
      if (!Store.get('isAuthenticated')) {
        ToastRenderer.show('请先解锁', 'info');
        showPasswordUnlock();
        break;
      }
      if (!dataset.entryId) break;
      const entries = EntryService.loadAll();
      const entry = entries.find(e => e.id === dataset.entryId);
      if (entry) openEditModal(entry, entry.date);
      break;
    }
    case 'delete-entry': {
      if (!Store.get('isAuthenticated')) break;
      if (!dataset.entryId) break;
      deleteEntry(dataset.entryId);
      break;
    }
    case 'add-entry': {
      if (!Store.get('isAuthenticated')) {
        ToastRenderer.show('请先解锁', 'info');
        showPasswordUnlock();
        break;
      }
      const dateStr = Store.get('selectedDate');
      openEditModal(null, dateStr);
      break;
    }
    case 'save-entry': {
      saveEntry(dataset.entryId || '');
      break;
    }
    case 'close-modal': {
      closeModal();
      break;
    }
    case 'edit-from-view': {
      if (!dataset.entryId) break;
      const entries = EntryService.loadAll();
      const entry = entries.find(e => e.id === dataset.entryId);
      if (entry) openEditModal(entry, entry.date);
      break;
    }
    case 'delete-from-edit': {
      if (!dataset.entryId) break;
      deleteEntry(dataset.entryId);
      break;
    }
    case 'toggle-lock': {
      if (Store.get('isAuthenticated')) {
        // Lock
        PasswordService.clearSession();
        Store.set('isAuthenticated', false);
        closeModal();
        refreshUI();
        ToastRenderer.show('已锁定，日记为只读模式', 'info');
      } else {
        // Show unlock dialog
        showPasswordUnlock();
      }
      break;
    }
    case 'cancel-unlock': {
      hidePasswordDialog();
      break;
    }
    case 'open-settings': {
      showSettings();
      break;
    }
    case 'close-settings': {
      hideSettings();
      break;
    }
    case 'sync-retry': {
      const status = Store.get('syncStatus');
      if (status === 'error' || status === 'offline') {
        Store.set('syncStatus', 'syncing');
        updateSyncDot();
        GitHubService.fetchEntries().then(({ entries, sha, exists }) => {
          Store._cachedSha = sha;
          if (!exists) {
            // Push local data if remote doesn't exist
            const local = EntryService.loadAll();
            GitHubService.pushEntries(local, null).then(ns => {
              Store._cachedSha = ns;
              Store.set('syncStatus', 'synced');
              refreshUI();
              ToastRenderer.show('已上传本地数据', 'success');
            }).catch(err => {
              Store.set('syncStatus', 'error');
              updateSyncDot();
              ToastRenderer.show('同步失败: ' + err.message, 'error');
            });
          } else {
            EntryService.saveAll(entries);
            Store.set('entries', entries);
            Store.set('syncStatus', 'synced');
            refreshUI();
            ToastRenderer.show('同步成功', 'success');
          }
        }).catch(err => {
          Store.set('syncStatus', 'error');
          updateSyncDot();
          ToastRenderer.show('同步失败: ' + err.message, 'error');
        });
      }
      break;
    }
  }
}

// Global event delegation (on document to catch modal clicks too)
document.addEventListener('click', (e) => {
  const actionable = e.target.closest('[data-action]');
  if (!actionable) return;

  const action = actionable.dataset.action;
  // Don't trigger view-entry when clicking edit/delete buttons
  if (action === 'view-entry' && e.target.closest('.entry-actions')) return;

  e.preventDefault();
  handleAction(action, actionable.dataset);
});

// Modal overlay click to close
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// Password overlay - no backdrop close for security

// Settings overlay click to close
document.getElementById('settings-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) hideSettings();
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    // Close modal first
    if (!document.getElementById('modal-overlay').classList.contains('hidden')) {
      closeModal();
      return;
    }
    // Close settings
    if (!document.getElementById('settings-overlay').classList.contains('hidden')) {
      hideSettings();
      return;
    }
    // Close confirm
    if (!document.getElementById('confirm-overlay').classList.contains('hidden')) {
      hideConfirm();
      return;
    }
  }
  // Ctrl+N for new entry
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    if (Store.get('isAuthenticated') && document.getElementById('modal-overlay').classList.contains('hidden') && document.getElementById('password-overlay').classList.contains('hidden')) {
      e.preventDefault();
      const dateStr = Store.get('selectedDate');
      openEditModal(null, dateStr);
    }
  }
});

/* =================================================================
   SECTION 5: Initialization
   ================================================================= */

function refreshUI() {
  renderMonthLabel();
  renderCalendar();
  renderDiaryList();
  updateFAB();
  updateLockButton();
  updateSyncDot();
}

function updateSyncDot() {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  const hasToken = GitHubService.hasToken();
  const status = Store.get('syncStatus');
  if (!hasToken) {
    dot.className = 'sync-dot none'; dot.title = '未设置同步';
  } else if (status === 'synced') {
    dot.className = 'sync-dot synced'; dot.title = '已同步';
  } else if (status === 'syncing') {
    dot.className = 'sync-dot syncing'; dot.title = '同步中...';
  } else if (status === 'offline') {
    dot.className = 'sync-dot offline'; dot.title = '离线，数据已本地保存';
  } else {
    dot.className = 'sync-dot error'; dot.title = '同步失败，点击重试';
  }
}

async function init() {
  Store.init();
  const isAuth = PasswordService.isSessionActive();
  Store.set('isAuthenticated', isAuth);

  // Step 1: Try auto-setup token from raw URL (new device, no manual entry needed)
  if (!GitHubService.hasToken()) {
    Store.set('syncStatus', 'syncing');
    updateSyncDot();
    const autoSetup = await GitHubService.tryAutoSetup();
    if (autoSetup) {
      console.log('📖 自动获取 Token 成功！');
    }
  }

  const hasToken = GitHubService.hasToken();
  Store.set('hasToken', hasToken);

  // Step 2: Pull from GitHub if token available
  if (hasToken) {
    Store.set('syncStatus', 'syncing');
    updateSyncDot();
    try {
      const { entries, sha, exists } = await GitHubService.fetchEntries();
      Store._cachedSha = sha;
      if (!exists) {
        const local = EntryService.loadAll();
        if (local.length > 0) {
          const newSha = await GitHubService.pushEntries(local, null);
          Store._cachedSha = newSha;
        }
        Store.set('entries', local);
      } else {
        EntryService.saveAll(entries);
        Store.set('entries', entries);
      }
      Store.set('syncStatus', 'synced');
      console.log('📖 已从 GitHub 加载 ' + Store.get('entries').length + ' 条日记');
    } catch(err) {
      console.warn('GitHub pull failed, using local cache:', err.message);
      const entries = EntryService.loadAll();
      Store.set('entries', entries);
      Store.set('syncStatus', err.message.includes('Token') ? 'error' : 'offline');
    }
  } else {
    const entries = EntryService.loadAll();
    Store.set('entries', entries);
    Store.set('syncStatus', 'none');
  }

  refreshUI();

  console.log('📖 日记应用已就绪');
  console.log('  密码: 9852 | ' + Store.get('entries').length + ' 条日记');
  console.log('  GitHub 同步: ' + (hasToken ? '已配置 ✓' : '未设置'));
}

// Start
document.addEventListener('DOMContentLoaded', init);

/* =================================================================
   SECTION 6: Utility Functions
   ================================================================= */

function escapeHTML(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

})();
